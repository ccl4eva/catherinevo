[build]
  command = "PORT=4173 BASE_PATH=/ pnpm --filter @workspace/catherine-vo run build"
  publish = "artifacts/catherine-vo/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

# SPA fallback for client-side routing (wouter).
# Netlify Forms intercepts form POSTs before this rewrite when the form
# is present in deployed HTML (see index.html + public/netlify-form.html).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
