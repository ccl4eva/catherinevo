[build]
  command = "PORT=4173 BASE_PATH=/ pnpm --filter @workspace/catherine-vo run build"
  publish = "artifacts/catherine-vo/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

# SPA fallback for client-side routing — GET/HEAD only so form POSTs reach Netlify Forms
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Method = ["GET", "HEAD"]}
