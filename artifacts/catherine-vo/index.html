    <script>
      (function () {
        try {
          var id = localStorage.getItem('cv-palette');
          var allowed = ['warm-gold', 'ink-paper', 'harbor', 'grove', 'plum-dusk'];
          document.documentElement.setAttribute(
            'data-palette',
            allowed.indexOf(id) >= 0 ? id : 'warm-gold'
          );
        } catch (e) {
          document.documentElement.setAttribute('data-palette', 'warm-gold');
        }
      })();
    </script>

  <body>
    <div id="root"></div>
    <!-- Netlify Forms: static copy so the form is detected at build time -->
    <form name="fractional-inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company-size" />

    </form>
